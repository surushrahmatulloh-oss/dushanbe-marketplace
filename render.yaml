# Blueprint барои Render.com — Web Service + PostgreSQL (free)

databases:
  - name: dushanbe-db
    plan: free
    region: oregon
    databaseName: dushanbe
    user: dushanbe

services:
  - type: web
    name: dushanbe-marketplace
    runtime: node
    plan: free
    region: oregon
    # Build бе DB. Migrate/seed дар start — seed хато диҳад ҳам, next start мешавад.
    buildCommand: npm install && npx prisma generate && npx next build
    startCommand: npx prisma db push --accept-data-loss; npx tsx prisma/seed.ts; npx next start -H 0.0.0.0 -p ${PORT:-10000}
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dushanbe-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: SEED_LIGHT
        value: "1"
