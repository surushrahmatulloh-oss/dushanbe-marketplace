# Blueprint — Web + PostgreSQL (ҳама Oregon)
# МУҲИМ: агар web қаблан Frankfurt бошад, онро DELETE кунед,
# баъд Blueprint → Manual Sync — сервиси нав дар Oregon месозад.

databases:
  - name: dushanbe-db
    plan: free
    region: oregon
    databaseName: dushanbe
    user: dushanbe

services:
  - type: web
    name: dushanbe-marketplace
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate && npx next build
    startCommand: node scripts/render-start.mjs
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
      - key: DATABASE_URL
        fromDatabase:
          name: dushanbe-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: SEED_LIGHT
        value: "1"
