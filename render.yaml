# Blueprint барои Render.com — Web Service + PostgreSQL (free)

databases:
  - name: dushanbe-db
    plan: free
    databaseName: dushanbe
    user: dushanbe

services:
  - type: web
    name: dushanbe-marketplace
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts && npx next build
    startCommand: npx next start -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dushanbe-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: SEED_LIGHT
        value: "1"
